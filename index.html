<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Live Taekwondo — idwt.web.id</title>
<!-- Mengganti font dengan gaya modern yang tegas ala scoreboard digital -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E13;--chung:#1E6FD9;--chung-dk:#0E2A52;--hong:#D9261E;--hong-dk:#521010;
    --ink:#F2F5FA;--mut:#8A94A6;--gold:#F5B325;--ok:#25C26E;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--ink);font-family:'Montserrat',system-ui,-apple-system,sans-serif;
       height:100dvh;display:flex;flex-direction:column;user-select:none}

  .wait{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:24px}
  .wait .mark{font-size:12px;letter-spacing:.35em;color:var(--gold);font-weight:700}
  .wait h1{font-size:22px;font-weight:800}
  .wait p{color:var(--mut);font-size:14px}

  .live{flex:1;display:none;flex-direction:column;min-height:0}
  .live.on{display:flex}

  /* Header Atas: Kategori & Nomor Partai (Menyerupai "1/4+ChildMale-25KG") */
  .head{display:flex;align-items:center;justify-content:center;gap:14px;padding:8px 10px;background:#000000;border-bottom:2px solid #1a212c;min-height:42px}
  .head .cat{font-family:'Oswald',sans-serif;font-size:clamp(16px,2.8vw,26px);font-weight:700;letter-spacing:.06em;color:#fff}
  .head .no{font-size:clamp(12px,2vw,16px);color:var(--gold);font-weight:800;letter-spacing:.08em;display:none} /* Dibuat fleksibel */
  .head.hide{display:none}

  /* Dua Sisi Arena (Biru & Merah) */
  .grid{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;position:relative}
  .team{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:8px;transition:background .2s}
  
  /* Gradien latar belakang warna khas Chung & Hong */
  .team.chung{background:linear-gradient(135deg, #103875 0%, #0d1e38 60%, #080d16 100%)}
  .team.hong{background:linear-gradient(135deg, #821410 0%, #3d0c0a 60%, #160808 100%)}

  /* Bagian Atas Sisi (Nama, Wilayah/Negara, dan Bendera) */
  .team .top{display:flex;flex-direction:row;align-items:center;justify-content:space-between;position:absolute;top:10px;left:15px;right:15px;padding:0 5px}
  
  .team .info-box{display:flex;flex-direction:column;gap:2px;}
  .team.chung .info-box{align-items:flex-start;}
  .team.hong .info-box{align-items:flex-end;}

  .team .nm{font-family:'Montserrat',sans-serif;font-size:clamp(22px,5.5vw,52px);font-weight:900;line-height:1.1;text-transform:uppercase;letter-spacing:.02em}
  .team.chung .nm{color:#FFFFFF}.team.hong .nm{color:#FFFFFF}
  
  .team .ctry{font-size:clamp(12px,2.2vw,18px);color:var(--mut);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  
  /* Bendera Negara */
  .team .img{width:clamp(45px,7vw,75px);height:clamp(30px,4.8vw,50px);object-fit:cover;border-radius:4px;border:1px solid rgba(255,255,255,.3);display:none;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
  .team .img.on{display:block}

  /* Skor Utama (Angka 6 dan 8 yang sangat besar) */
  .team .sc{font-family:'Montserrat',sans-serif;font-size:clamp(110px,30vw,260px);font-weight:900;line-height:.9;font-variant-numeric:tabular-nums;margin-top:20px;text-shadow: 0 4px 20px rgba(0,0,0,0.4)}
  .team.bump .sc{animation:bump .4s}
  @keyframes bump{0%{transform:scale(1)}30%{transform:scale(1.16);color:var(--gold)}100%{transform:scale(1)}}

  /* Statistik bawah tiap sisi (Gam-jeom, Hits, #Won) */
  .stats{position:absolute;bottom:12px;left:0;right:0;display:flex;justify-content:center;gap:clamp(15px,3vw,35px)}
  .stat{text-align:center}
  .stat .k{font-size:clamp(10px,1.5vw,13px);letter-spacing:.1em;color:var(--mut);font-weight:700;text-transform:uppercase}
  .stat .v{font-family:'Montserrat',sans-serif;font-size:clamp(18px,3.8vw,32px);font-weight:900;font-variant-numeric:tabular-nums}
  .stat.won .v{color:var(--gold)}

  /* Kotak Tengah: Nomor Match (A1001) dan Timer (0:36) */
  .center{position:absolute;left:50%;top:0;transform:translateX(-50%);
          display:flex;flex-direction:column;align-items:stretch;
          background:#000000;width:clamp(140px,22vw,220px);border-radius:0 0 12px 12px;border:2px solid #222b38;border-top:none;z-index:3;box-shadow:0 6px 20px rgba(0,0,0,0.6);overflow:hidden}
  
  .center .match-box{background:#000;padding:6px 4px;text-align:center;border-bottom:2px solid #222b38}
  .center .match-title{font-size:clamp(14px,2.2vw,20px);font-weight:900;letter-spacing:.08em;color:#fff}
  .center .match-label{font-size:clamp(9px,1.4vw,12px);font-weight:700;letter-spacing:.15em;color:var(--mut)}

  .center .clock-box{background:var(--gold);padding:6px 4px;text-align:center}
  .center .clock{font-family:'Montserrat',sans-serif;font-size:clamp(28px,6vw,56px);font-weight:900;font-variant-numeric:tabular-nums;line-height:1;color:#1A1206}
  .center .clock.brk{color:#D9261E}

  .center .round-box{background:#000;padding:6px 4px;text-align:center}
  .center .rnd{font-size:clamp(10px,1.5vw,13px);font-weight:700;letter-spacing:.15em;color:var(--mut);text-transform:uppercase}
  .center .rnd span{color:#fff;font-weight:900}

  /* Banner Pemenang / Peringatan */
  .banner{text-align:center;padding:8px;font-size:clamp(13px,2.6vw,18px);font-weight:900;letter-spacing:.05em;background:var(--gold);color:#1A1206;display:none}
  .banner.on{display:block}
  .banner.win{background:var(--ok);color:#08130C}

  /* Footer Bawah */
  .foot{display:flex;align-items:center;gap:8px;padding:5px 14px;font-size:11px;color:var(--mut);border-top:1px solid #1a212c;background:#05070a}
  .foot .dot{width:8px;height:8px;border-radius:50%;background:var(--mut)}
  .foot .dot.on{background:var(--ok)}
  .foot .brand{margin-left:auto;letter-spacing:.1em}

  .sound{position:fixed;right:12px;bottom:34px;z-index:9;background:var(--gold);color:#1A1206;border:none;
         border-radius:22px;padding:10px 16px;font-size:13px;font-weight:800;box-shadow:0 4px 16px rgba(0,0,0,.4)}
  .sound.hide{display:none}
</style>
</head>
<body>

<div id="tkdLoader">
  <div class="tkd-spin">
    <svg viewBox="0 0 100 100" width="86" height="86" aria-hidden="true">
      <circle cx="50" cy="50" r="48" fill="#1E6FD9"/>
      <path d="M50,2 A48,48 0 0,1 50,98 A24,24 0 0,1 50,50 A24,24 0 0,0 50,2 Z" fill="#D9261E"/>
      <circle cx="50" cy="26" r="7.5" fill="#1E6FD9"/>
      <circle cx="50" cy="74" r="7.5" fill="#D9261E"/>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#fff" stroke-width="2.5"/>
    </svg>
  </div>
  <div class="tkd-txt">LIVE TAEKWONDO</div>
</div>
<style>
#tkdLoader{position:fixed;inset:0;background:#0B0E13;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;z-index:99999;transition:opacity .45s}
#tkdLoader.out{opacity:0;pointer-events:none}
#tkdLoader .tkd-spin{animation:tkdSpin 1s cubic-bezier(.5,.05,.4,.95) infinite;filter:drop-shadow(0 6px 18px rgba(0,0,0,.5))}
@keyframes tkdSpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
#tkdLoader .tkd-txt{font:800 12px system-ui,-apple-system,sans-serif;letter-spacing:.35em;color:#F5B325;animation:tkdPulse 1s ease-in-out infinite}
@keyframes tkdPulse{0%,100%{opacity:.5}50%{opacity:1}}
</style>
<script>window.addEventListener('load',function(){setTimeout(function(){var l=document.getElementById('tkdLoader');if(l){l.classList.add('out');setTimeout(function(){l.remove();},480);}},650);});</script>


  <div class="wait" id="wait">
    <div class="mark">LIVE TAEKWONDO</div>
    <h1>Menunggu pertandingan…</h1>
    <p id="waitSub">Belum ada pertandingan yang ditayangkan.</p>
  </div>

  <div class="live" id="live">
    <!-- Header Utama Kategori / Turnamen -->
    <div class="head" id="head">
      <span class="cat" id="cat"></span>
      <span class="no" id="no"></span>
    </div>
    <div class="banner" id="banner"></div>
    
    <div class="grid">
      <!-- SISI KIRI (CHUNG / BLUE) -->
      <div class="team chung" id="teamChung">
        <div class="top">
          <img class="img" id="imgChung" alt="">
          <div class="info-box">
            <div class="nm" id="nmChung">Jim</div>
            <div class="ctry" id="ctryChung">Washington</div>
          </div>
        </div>
        <div class="sc" id="scChung">0</div>
        <div class="stats" id="statChung"></div>
      </div>

      <!-- SISI KANAN (HONG / RED) -->
      <div class="team hong" id="teamHong">
        <div class="top">
          <div class="info-box">
            <div class="nm" id="nmHong">LeSai</div>
            <div class="ctry" id="ctryHong">New York</div>
          </div>
          <img class="img" id="imgHong" alt="">
        </div>
        <div class="sc" id="scHong">0</div>
        <div class="stats" id="statHong"></div>
      </div>

      <!-- KOTAK TENGAH (NOMOR MATCH, TIMER, DAN ROUND) -->
      <div class="center">
        <div class="match-box">
          <div class="match-title" id="matchCode">A1001</div>
          <div class="match-label">MATCH</div>
        </div>
        <div class="clock-box">
          <div class="clock" id="clock">0:36</div>
        </div>
        <div class="round-box">
          <div class="rnd"><span id="round">1</span> ROUND</div>
        </div>
      </div>
    </div>

    <div class="foot">
      <span class="dot" id="dot"></span><span id="connText">menyambung…</span>
      <span class="brand">idwt.web.id &middot; V1 &middot; &copy;SRISP 2026</span>
    </div>
  </div>

  <button class="sound hide" id="btnSound">🔊 Aktifkan suara</button>

<script type="module">
import { db } from "./firebase-config.js";
import { ref, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const $ = id => document.getElementById(id);

/* ===== Suara ===== */
let ac=null, soundOn=false;
function initAudio(){
  if (ac){ ac.resume(); soundOn=true; $('btnSound').classList.add('hide'); return; }
  try{ ac=new (window.AudioContext||window.webkitAudioContext)(); soundOn=true; $('btnSound').classList.add('hide'); }catch(e){}
}
$('btnSound').addEventListener('click', initAudio);
$('btnSound').classList.remove('hide');
function nada(f,d,t='sine',v=0.3){ if(!ac||!soundOn)return; const o=ac.createOscillator(),g=ac.createGain();
  o.type=t;o.frequency.value=f;o.connect(g);g.connect(ac.destination);const n=ac.currentTime;
  g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(v,n+0.01);g.gain.exponentialRampToValueAtTime(0.0001,n+d);o.start(n);o.stop(n+d); }
function bunyiPoin(){ nada(880,0.12,'triangle',0.35); setTimeout(()=>nada(1175,0.14,'triangle',0.35),90); }
function bunyiBel(){ nada(300,0.7,'sine',0.4); setTimeout(()=>nada(300,0.7,'sine',0.3),120); }

/* ===== Ambil Pertandingan Live ===== */
let KODE=null;
const hash=decodeURIComponent(location.hash.replace(/^#/,"")).toUpperCase();
if (hash){ pasang(hash); }
else onValue(ref(db,"live"), s=>{ const k=s.val(); if(k&&k!==KODE)pasang(k); else if(!k){KODE=null;$('live').classList.remove('on');$('wait').style.display='flex';} });

let cfg={showNames:true,showImg:true,showCountry:true,showHeader:true,showGamjeom:true,showHits:true,showWon:true};
let prev={chung:0,hong:0}, prevRem=null, sudahBel=false, pertama=true, cur=null;

function pasang(kode){
  KODE=kode; $('wait').style.display='none'; $('live').classList.add('on');
  koneksi();
  onValue(ref(db,`matches/${kode}/meta`), s=> renderMeta(s.val()||{}));
  onValue(ref(db,`matches/${kode}/config`), s=>{ cfg=Object.assign(cfg,s.val()||{}); applyConfig(); });
  onValue(ref(db,`matches/${kode}/state`), s=>{ const st=s.val(); if(st) renderState(st); });
}

function renderMeta(m){
  $('cat').textContent = m.category || "";
  $('matchCode').textContent = m.no ? "A" + String(m.no).padStart(4, '0') : "A1001"; // Default menyesuaikan gambar
  const c=m.chung||{}, h=m.hong||{};
  $('nmChung').textContent = c.name || "Jim";
  $('nmHong').textContent  = h.name || "LeSai";
  $('ctryChung').textContent = c.country || "Washington";
  $('ctryHong').textContent  = h.country || "New York";
  setImg('imgChung', c.img); setImg('imgHong', h.img);
  applyConfig();
}
function setImg(id,url){ const el=$(id); if(url){ el.src=url; el.dataset.has="1"; } else { el.removeAttribute('src'); el.dataset.has=""; } applyConfig(); }

function applyConfig(){
  $('head').classList.toggle('hide', !cfg.showHeader || (!$('cat').textContent && !$('matchCode').textContent));
  ['Chung','Hong'].forEach(s=>{
    $('nm'+s).style.display = cfg.showNames ? "" : "none";
    $('ctry'+s).style.display = cfg.showCountry ? "" : "none";
    const img=$('img'+s); img.classList.toggle('on', cfg.showImg && img.dataset.has==="1");
  });
  renderStats();
}

function renderState(st){
  cur=st;
  if(!pertama){
    if((st.chung||0)>prev.chung){ bump('teamChung'); bunyiPoin(); }
    if((st.hong||0)>prev.hong){ bump('teamHong'); bunyiPoin(); }
  }
  prev={chung:st.chung||0,hong:st.hong||0}; pertama=false;
  $('scChung').textContent=st.chung||0;
  $('scHong').textContent =st.hong||0;
  $('round').textContent  =st.round||1;

  const b=$('banner');
  if(st.matchOver && st.winner){ b.textContent="PEMENANG: "+(st.winner==="chung"?($('nmChung').textContent):($('nmHong').textContent)); b.className="banner win on"; }
  else if(st.phase==="stopped"){ b.textContent="PERTANDINGAN DIHENTIKAN"; b.className="banner on"; }
  else b.className="banner";

  renderStats();
  renderClock();
}

function renderStats(){
  const st=cur||{};
  const build = side => {
    let h="";
    if(cfg.showGamjeom) h+=`<div class="stat"><div class="k">Gam-jeom</div><div class="v">${st['gamjeom'+cap(side)]||0}</div></div>`;
    if(cfg.showHits)    h+=`<div class="stat"><div class="k">Hits</div><div class="v">${st['hits'+cap(side)]||0}</div></div>`;
    if(cfg.showWon)     h+=`<div class="stat won"><div class="k">#Won</div><div class="v">${st['won'+cap(side)]||0}</div></div>`;
    return h;
  };
  $('statChung').innerHTML=build('chung');
  $('statHong').innerHTML =build('hong');
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function fmt(sec){ const m=Math.floor(sec/60); return `${m}:${String(sec%60).padStart(2,'0')}`; }
function renderClock(){
  const s=cur; if(!s)return;
  let sec = s.phase==="running" ? Math.max(0,Math.round((s.endAt-Date.now())/1000)) : (s.remaining??36);
  if(prevRem!==null && prevRem>0 && sec===0 && s.phase==="running" && !sudahBel){ bunyiBel(); sudahBel=true; }
  if(sec>0) sudahBel=false; prevRem=sec;
  const c=$('clock'); c.textContent=fmt(sec); c.classList.toggle('brk', s.phase==="break");
}
setInterval(renderClock,250);

function bump(id){ const el=$(id); el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
function koneksi(){ onValue(ref(db,".info/connected"), s=>{ const on=s.val()===true; $('dot').classList.toggle('on',on); $('connText').textContent=on?"tersambung":"terputus"; }); }
</script>
</body>
</html>
