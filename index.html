<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Taekwondo — Pilih Peran</title>
<style>
  :root{
    --bg:#0E1116;--panel:#171C24;--line:#2A3242;
    --chung:#1E6FD9;--hong:#D9261E;--ink:#F2F5FA;--mut:#8A94A6;--gold:#F5B325;--ok:#25C26E;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
       padding:24px;gap:22px}
  .brand{text-align:center}
  .brand .mark{font-size:12px;letter-spacing:.35em;color:var(--gold);font-weight:700}
  .brand h1{font-size:26px;font-weight:800;margin-top:6px}
  .brand p{color:var(--mut);font-size:13px;margin-top:6px}
  .cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:420px}
  a.card{
    display:flex;align-items:center;gap:16px;text-decoration:none;color:var(--ink);
    background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;
    transition:transform .1s,border-color .1s;
  }
  a.card:active{transform:scale(.98)}
  a.card .ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex-shrink:0}
  a.card.wasit .ico{background:linear-gradient(135deg,var(--chung),var(--hong));color:#fff}
  a.card.op .ico{background:var(--ok);color:#08130C}
  a.card.tamu .ico{background:var(--gold);color:#1A1206}
  a.card .t{font-size:17px;font-weight:800}
  a.card .s{font-size:12px;color:var(--mut);margin-top:2px}
  a.card.soon{opacity:.5;pointer-events:none}
  a.card .badge{margin-left:auto;font-size:11px;color:var(--mut);border:1px solid var(--line);padding:3px 8px;border-radius:20px}
  footer{color:var(--mut);font-size:11px;text-align:center;margin-top:4px}
</style>
</head>
<body>
  <div class="brand">
    <div class="mark">LIVE TAEKWONDO</div>
    <h1>Papan Skor</h1>
    <p>Standar World Taekwondo · penilaian 3 wasit</p>
  </div>

  <div class="cards">
    <a class="card wasit" href="./wasit.html">
      <div class="ico">W</div>
      <div><div class="t">Wasit</div><div class="s">Masukkan kode & nomor kursi</div></div>
    </a>
    <a class="card op" href="./operator.html">
      <div class="ico">O</div>
      <div><div class="t">Operator</div><div class="s">Kendali pertandingan (perlu PIN)</div></div>
    </a>
    <a class="card tamu soon" href="./tamu.html">
      <div class="ico">T</div>
      <div><div class="t">Tamu / Penonton</div><div class="s">Lihat skor langsung</div></div>
      <span class="badge">segera</span>
    </a>
  </div>

  <footer>idwt.web.id</footer>
</body>
</html>
