<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Skor Taekwondo — Tahap 1 (Simulasi)</title>
<style>
  :root{
    --bg:#0E1116;
    --panel:#171C24;
    --line:#2A3242;
    --chung:#1E6FD9;      /* biru WT */
    --chung-dk:#144A92;
    --hong:#D9261E;       /* merah WT */
    --hong-dk:#8F1712;
    --ink:#F2F5FA;
    --mut:#8A94A6;
    --gold:#F5B325;       /* kilat poin sah */
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;min-height:100dvh;
    user-select:none;
  }

  /* ===== Papan skor ===== */
  .board{
    display:grid;grid-template-columns:1fr auto 1fr;
    align-items:stretch;border-bottom:2px solid var(--line);
  }
  .side{padding:10px 8px;text-align:center}
  .side.chung{background:linear-gradient(180deg,var(--chung-dk),transparent 140%)}
  .side.hong{background:linear-gradient(180deg,var(--hong-dk),transparent 140%)}
  .side .nm{font-size:12px;letter-spacing:.15em;color:var(--mut);text-transform:uppercase}
  .side .sc{
    font-size:clamp(44px,14vw,72px);font-weight:800;line-height:1;
    font-variant-numeric:tabular-nums;transition:transform .15s;
  }
  .side.flash .sc{color:var(--gold);transform:scale(1.12)}
  .mid{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 10px;gap:2px}
  .mid .rnd{font-size:11px;color:var(--mut);letter-spacing:.1em}
  .mid .rv{font-size:20px;font-weight:700}

  /* ===== Tab wasit ===== */
  .tabs{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--line)}
  .tab{
    padding:12px 0;text-align:center;font-size:14px;font-weight:600;
    color:var(--mut);background:none;border:none;border-bottom:3px solid transparent;
  }
  .tab.on{color:var(--ink);border-bottom-color:var(--gold)}

  /* ===== Panel tombol wasit ===== */
  .pad{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
  .col{display:flex;flex-direction:column;gap:8px}
  .btn{
    flex:1;border:none;border-radius:12px;color:#fff;
    font-size:16px;font-weight:700;line-height:1.25;
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;
    min-height:56px;
  }
  .btn small{font-size:12px;font-weight:500;opacity:.8}
  .col.chung .btn{background:var(--chung)}
  .col.hong .btn{background:var(--hong)}
  .btn:active{filter:brightness(1.35)}

  /* ===== Log & kontrol ===== */
  .foot{border-top:1px solid var(--line);background:var(--panel)}
  .foot-bar{display:flex;gap:8px;padding:8px 10px;align-items:center}
  .foot-bar .lbl{font-size:12px;color:var(--mut);flex:1}
  .mini{
    background:var(--line);color:var(--ink);border:none;border-radius:8px;
    padding:8px 14px;font-size:13px;font-weight:600;
  }
  .log{
    max-height:110px;overflow-y:auto;padding:0 12px 10px;
    font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums;
  }
  .log .hit{color:var(--gold);font-weight:700}
  @media (prefers-reduced-motion:reduce){ .side .sc{transition:none} }
</style>
</head>
<body>

  <!-- Papan skor -->
  <div class="board">
    <div class="side chung" id="sideChung">
      <div class="nm">Chung</div>
      <div class="sc" id="scoreChung">0</div>
    </div>
    <div class="mid">
      <div class="rnd">RONDE</div>
      <div class="rv" id="roundView">1</div>
    </div>
    <div class="side hong" id="sideHong">
      <div class="nm">Hong</div>
      <div class="sc" id="scoreHong">0</div>
    </div>
  </div>

  <!-- Tab pilih wasit (mode simulasi) -->
  <div class="tabs" id="tabs">
    <button class="tab on" data-j="1">Wasit 1</button>
    <button class="tab" data-j="2">Wasit 2</button>
    <button class="tab" data-j="3">Wasit 3</button>
  </div>

  <!-- Tombol skor -->
  <div class="pad">
    <div class="col chung" id="colChung"></div>
    <div class="col hong" id="colHong"></div>
  </div>

  <!-- Log pengujian -->
  <div class="foot">
    <div class="foot-bar">
      <span class="lbl">Poin sah = 2 dari 3 wasit menekan sama dalam 1 detik</span>
      <button class="mini" id="btnReset">Reset</button>
    </div>
    <div class="log" id="log"></div>
  </div>

<script>
/* ================== KONFIGURASI WT ================== */
const TEKNIK = [
  { id:'pukulan',     nama:'Pukulan',      pts:1 },
  { id:'badan',       nama:'Badan',        pts:2 },
  { id:'kepala',      nama:'Kepala',       pts:3 },
  { id:'putar_badan', nama:'Putar Badan',  pts:4 },
  { id:'putar_kepala',nama:'Putar Kepala', pts:5 },
];
const JENDELA_MS   = 1000; // jendela persetujuan antar wasit
const WASIT_MINIMAL = 2;   // minimal wasit setuju

/* ================== STATE ================== */
let wasitAktif = 1;                 // hanya untuk mode simulasi
let skor = { chung:0, hong:0 };
let presses = [];                   // {judge, side, tech, pts, t, consumed}

/* ================== LOGIKA INTI (dipakai lagi di Tahap 2) ==================
   catatTekanan(): dipanggil tiap wasit menekan tombol.
   Mengembalikan {sah:true, pts} bila ambang 2-dari-3 tercapai. */
function catatTekanan(judge, side, techId){
  const teknik = TEKNIK.find(t => t.id === techId);
  const now = Date.now();
  const rec = { judge, side, tech:techId, pts:teknik.pts, t:now, consumed:false };
  presses.push(rec);

  // buang tekanan kedaluwarsa agar array tetap kecil
  presses = presses.filter(p => now - p.t <= JENDELA_MS * 3);

  // cari tekanan sama (sisi+teknik) dalam jendela, belum terpakai
  const cocok = presses.filter(p =>
    !p.consumed && p.side === side && p.tech === techId && (now - p.t) <= JENDELA_MS
  );
  const jumlahWasit = new Set(cocok.map(p => p.judge)).size;

  if (jumlahWasit >= WASIT_MINIMAL){
    cocok.forEach(p => p.consumed = true);   // cegah poin ganda saat wasit ke-3 menekan
    return { sah:true, pts:teknik.pts };
  }
  return { sah:false, pts:0 };
}

function beriPoin(side, pts){
  skor[side] += pts;
  render();
  flash(side);
  if (navigator.vibrate) navigator.vibrate(80);
}

/* ================== UI ================== */
const $ = id => document.getElementById(id);

function buatTombol(){
  ['chung','hong'].forEach(side => {
    const col = $(side === 'chung' ? 'colChung' : 'colHong');
    TEKNIK.forEach(t => {
      const b = document.createElement('button');
      b.className = 'btn';
      b.innerHTML = `${t.nama}<small>+${t.pts}</small>`;
      b.addEventListener('click', () => tekan(side, t.id));
      col.appendChild(b);
    });
  });
}

function tekan(side, techId){
  const hasil = catatTekanan(wasitAktif, side, techId);
  const t = TEKNIK.find(x => x.id === techId);
  tulisLog(`W${wasitAktif} → ${side.toUpperCase()} ${t.nama}`);
  if (hasil.sah){
    beriPoin(side, hasil.pts);
    tulisLog(`✔ POIN SAH +${hasil.pts} untuk ${side.toUpperCase()}`, true);
  }
}

function render(){
  $('scoreChung').textContent = skor.chung;
  $('scoreHong').textContent  = skor.hong;
}

function flash(side){
  const el = $(side === 'chung' ? 'sideChung' : 'sideHong');
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 350);
}

function tulisLog(teks, hit=false){
  const jam = new Date().toLocaleTimeString('id-ID',{hour12:false});
  const div = document.createElement('div');
  if (hit) div.className = 'hit';
  div.textContent = `${jam}  ${teks}`;
  const log = $('log');
  log.prepend(div);
  while (log.children.length > 40) log.lastChild.remove();
}

/* tab wasit */
$('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  wasitAktif = Number(btn.dataset.j);
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t === btn));
});

/* reset */
$('btnReset').addEventListener('click', () => {
  skor = { chung:0, hong:0 };
  presses = [];
  render();
  tulisLog('— skor direset —');
});

buatTombol();
render();
</script>
</body>
</html>
