<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Live Taekwondo — idwt.web.id</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E13;--chung:#175CE6;--hong:#CF0000;
    --ink:#F2F5FA;--mut:#a0aab8;--gold:#F5B325;--ok:#25C26E;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--ink);font-family:'Montserrat',system-ui,-apple-system,sans-serif;
       height:100dvh;display:flex;flex-direction:column;user-select:none}

  .wait{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:24px}
  .wait .mark{font-size:12px;letter-spacing:.35em;color:var(--gold);font-weight:700}
  .wait h1{font-size:22px;font-weight:800}
  .wait p{color:var(--mut);font-size:14px}

  .live{flex:1;display:none;flex-direction:column;min-height:0}
  .live.on{display:flex}

  /* Header Paling Atas */
  .head{display:flex;align-items:center;justify-content:center;gap:16px;padding:6px 12px;background:#000000;border-bottom:2px solid #1a212c;min-height:38px;flex-shrink:0}
  .head .cat{font-family:'Oswald',sans-serif;font-size:clamp(16px,2.5vw,26px);font-weight:700;letter-spacing:.08em;color:#fff}
  .head .no{font-size:clamp(12px,2vw,18px);color:var(--gold);font-weight:800;letter-spacing:.08em}
  .head.hide{display:none}

  /* Banner Pemenang / Peringatan */
  .banner{text-align:center;padding:6px;font-size:clamp(13px,2.2vw,18px);font-weight:900;letter-spacing:.05em;background:var(--gold);color:#1A1206;display:none;flex-shrink:0}
  .banner.on{display:block}
  .banner.win{background:var(--ok);color:#08130C}

  /* Container Tombol Switch (Center Atas di bawah Banner) */
  .switch-container{background:#000;display:flex;justify-content:center;padding:4px 0;flex-shrink:0;border-bottom:1px solid #1a212c}
  .btn-switch{background:rgba(255, 255, 255, 0.12);color:rgba(255, 255, 255, 0.85);border:1px solid rgba(255, 255, 255, 0.2);
              border-radius:16px;padding:4px 14px;font-size:11px;font-weight:700;cursor:pointer;backdrop-filter:blur(4px);transition:all .2s}
  .btn-switch:hover{background:rgba(255, 255, 255, 0.25);color:#fff}

  /* Layout Utama */
  .grid{flex:1;display:flex;min-height:0;position:relative;background:#000}
  .grid.swapped{flex-direction:row-reverse;}
  
  /* Sisi Tim */
  .team{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:12px;overflow:hidden}
  .team.chung{background:var(--chung)}
  .team.hong{background:var(--hong)}

  /* Bagian Atas Sisi (Bendera & Nama Atlet) */
  .team .top{display:flex;align-items:center;position:absolute;top:15px;gap:10px;z-index:2}
  .team.chung .top{left:20px;}
  .team.hong .top{right:20px;flex-direction:row-reverse;}

  .team .flag-box{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .team .img{width:clamp(40px,6vw,70px);height:clamp(28px,4.2vw,48px);object-fit:cover;border-radius:3px;border:1px solid rgba(255,255,255,.4);display:none;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
  .team .img.on{display:block}
  .team .code{font-size:clamp(10px,1.4vw,13px);font-weight:800;color:rgba(255,255,255,0.8);letter-spacing:.08em;text-transform:uppercase}

  .team .info-box{display:flex;flex-direction:column;gap:1px;}
  .team.chung .info-box{align-items:flex-start;}
  .team.hong .info-box{align-items:flex-end;text-align:right;}

  .team .nm{font-family:'Montserrat',sans-serif;font-size:clamp(20px,4.5vw,46px);font-weight:900;line-height:1.1;text-transform:uppercase;letter-spacing:.02em;color:#fff}
  .team .ctry{font-size:clamp(11px,1.8vw,16px);color:rgba(255,255,255,0.85);font-weight:700;letter-spacing:.05em;text-transform:uppercase}

  /* Skor Utama */
  .team .sc{font-family:'Montserrat',sans-serif;font-size:clamp(100px,28vw,260px);font-weight:900;line-height:.9;font-variant-numeric:tabular-nums;margin-top:10px;text-shadow: 0 4px 20px rgba(0,0,0,0.3)}
  .team.bump .sc{animation:bump .4s}
  @keyframes bump{0%{transform:scale(1)}30%{transform:scale(1.16);color:var(--gold)}100%{transform:scale(1)}}

  /* Statistik Bawah Sisi */
  .stats{position:absolute;bottom:15px;display:flex;gap:clamp(16px,3vw,32px);z-index:2}
  .team.chung .stats{left:25px;}
  .team.hong .stats{right:25px;}
  .stat{text-align:center}
  .stat .k{font-size:clamp(10px,1.4vw,12px);letter-spacing:.08em;color:rgba(255,255,255,0.9);font-weight:700;text-transform:uppercase}
  .stat .v{font-family:'Montserrat',sans-serif;font-size:clamp(18px,3.2vw,30px);font-weight:900;font-variant-numeric:tabular-nums;color:#fff}
  .stat.won .v{color:var(--gold)}

  /* KOTAK TENGAH */
  .center{width:clamp(130px,20vw,190px);background:transparent;display:flex;flex-direction:column;align-items:stretch;justify-content:center;z-index:5;flex-shrink:0;gap:2px;}
  
  .center .match-box{background:#000;padding:12px 6px;text-align:center;border-bottom:2px solid #222}
  .center .match-title{font-size:clamp(15px,2.4vw,22px);font-weight:900;letter-spacing:.08em;color:#fff}
  .center .match-label{font-size:clamp(9px,1.2vw,11px);font-weight:700;letter-spacing:.15em;color:var(--mut)}

  .center .clock-box{background:var(--gold);padding:14px 6px;text-align:center}
  .center .clock{font-family:'Montserrat',sans-serif;font-size:clamp(28px,5.8vw,56px);font-weight:900;font-variant-numeric:tabular-nums;line-height:1;color:#1A1206}
  .center .clock.brk{color:#C3221B}

  .center .round-box{background:#000;padding:12px 6px;text-align:center;border-top:2px solid #222}
  .center .rnd{display:flex;flex-direction:column;align-items:center;gap:1px}
  .center .rnd .rn{font-size:clamp(28px,6.5vw,54px);font-weight:900;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
  .center .rnd .rl{font-size:clamp(8px,1.1vw,11px);font-weight:700;letter-spacing:.15em;color:var(--mut)}

  /* Footer Bawah */
  .foot{display:flex;align-items:center;gap:8px;padding:5px 14px;font-size:11px;color:var(--mut);border-top:1px solid #1a212c;background:#05070a;flex-shrink:0}
  .foot .dot{width:8px;height:8px;border-radius:50%;background:var(--mut)}
  .foot .dot.on{background:var(--ok)}
  .foot .brand{margin-left:auto;letter-spacing:.1em}

  .sound{position:fixed;right:12px;top:10px;z-index:90;background:var(--gold);color:#1A1206;border:none;
         border-radius:22px;padding:10px 16px;font-size:13px;font-weight:800;box-shadow:0 4px 16px rgba(0,0,0,.4)}
  .sound.hide{display:none}

  /* ==== Tahap 2: status jelas ==== */
  #statusBar{position:fixed;left:50%;top:8.5dvh;transform:translateX(-50%);z-index:40;display:none;
    padding:8px 26px;border-radius:30px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
    font-size:clamp(15px,3.2vw,30px);background:var(--gold);color:#1A1206;
    box-shadow:0 6px 22px rgba(0,0,0,.5);animation:stPulse 1s ease-in-out infinite}
  #statusBar.on{display:block}
  #statusBar.pause{background:#2a2f3a;color:#fff}
  @keyframes stPulse{0%,100%{opacity:1}50%{opacity:.5}}

  /* ==== deklarasi pemenang RONDE (kedip) ==== */
  #roundFlash{position:fixed;inset:0;z-index:60;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:10px;background:rgba(0,0,0,.6);text-align:center;padding:20px}
  #roundFlash.on{display:flex;animation:flashPulse .8s ease-in-out infinite}
  #roundFlash .rfName{font-size:clamp(44px,13vw,130px);font-weight:900;text-transform:uppercase;line-height:1;
    text-shadow:0 4px 26px rgba(0,0,0,.7)}
  #roundFlash .rfSub{font-size:clamp(16px,4.2vw,38px);font-weight:900;letter-spacing:.08em;color:#fff}
  #roundFlash.chung .rfName{color:#6aa8ff}
  #roundFlash.hong .rfName{color:#ff7a7a}

  /* ==== deklarasi pemenang PARTAI (kedip meriah) ==== */
  #matchFlash{position:fixed;inset:0;z-index:70;display:none;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:20px}
  #matchFlash.on{display:flex;animation:mfBg 1.1s ease-in-out infinite}
  #matchFlash.chung{background:radial-gradient(circle at 50% 45%,#1f6bf5,#0a2f7a)}
  #matchFlash.hong{background:radial-gradient(circle at 50% 45%,#e01414,#6e0000)}
  #matchFlash .mfLabel{font-size:clamp(13px,3vw,26px);font-weight:800;letter-spacing:.3em;color:rgba(255,255,255,.85)}
  #matchFlash .mfName{font-size:clamp(48px,14vw,150px);font-weight:900;color:#fff;text-transform:uppercase;
    line-height:1;margin:10px 0;text-shadow:0 6px 30px rgba(0,0,0,.55)}
  #matchFlash .mfSub{font-size:clamp(17px,4.4vw,36px);font-weight:900;letter-spacing:.06em;color:var(--gold)}
  @keyframes flashPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.97)}}
  @keyframes mfBg{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4)}}

  /* ==== menu pertandingan ==== */
  /* z-index 90: tetap di atas layar pemenang ronde (60) & partai (70) agar selalu bisa diklik */
  #btnMenu{position:fixed;left:12px;top:10px;z-index:90;background:rgba(0,0,0,.34);
    color:#fff;border:1px solid rgba(255,255,255,.45);border-radius:22px;padding:8px 15px;
    font-size:12px;font-weight:800;letter-spacing:.05em;backdrop-filter:blur(5px);cursor:pointer;
    box-shadow:0 2px 9px rgba(0,0,0,.4)}
  #btnMenu:hover{background:rgba(0,0,0,.5)}
  #menuPanel{position:fixed;inset:0;z-index:100;display:none;background:rgba(6,8,12,.93);
    flex-direction:column;padding:14px}
  #menuPanel.on{display:flex}
  #menuPanel .mpHead{display:flex;align-items:center;justify-content:space-between;color:#fff;
    font-size:clamp(16px,3vw,22px);font-weight:900;letter-spacing:.05em;padding:6px 4px 12px;border-bottom:1px solid #222}
  #menuPanel .mpHead button{background:none;border:none;color:#fff;font-size:28px;line-height:1;font-weight:700}
  #menuPanel .mpBody{flex:1;overflow-y:auto;padding:10px 2px;display:flex;flex-direction:column;gap:8px}
  .mpSec{color:var(--mut);font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-top:8px}
  .mpSec b{color:#fff;margin-left:4px}
  .mpItem{background:#12161d;border:1px solid #232a35;border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color .15s}
  .mpItem:active{border-color:var(--gold)}
  .mpItem.kini{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.5) inset}
  .mpNow{float:right;font-size:9.5px;font-weight:800;color:#0A0C10;background:#fff;
    padding:2px 8px;border-radius:20px;letter-spacing:.06em}
  .mpItem.sedang{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
  .mpTop{font-size:12px;font-weight:800;letter-spacing:.06em;color:var(--gold);margin-bottom:6px}
  .mpVs{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .mpx{color:var(--mut);font-size:12px;font-weight:700}
  .mpChip{font-size:clamp(13px,2.4vw,16px);font-weight:800;color:#fff;padding:3px 10px;border-radius:6px}
  .mpChip.chung{background:var(--chung)} .mpChip.hong{background:var(--hong)}
  .mpKet{margin-top:7px;font-size:13px;font-weight:700;color:#cdd4de}
  .mpKet.live{color:var(--gold)}
  .mpEmpty{color:var(--mut);text-align:center;padding:30px;font-size:14px}

  /* ==== ikon rekaman pukulan di bilah ==== */
  .hitrow{position:absolute;bottom:clamp(56px,9vh,84px);display:flex;flex-direction:column;gap:3px;
    max-width:40%;z-index:3;pointer-events:none}
  .team.chung .hitrow{left:22px;align-items:flex-start}
  .team.hong  .hitrow{right:22px;align-items:flex-end}
  .hline{display:flex;flex-wrap:wrap;gap:2px}
  .team.hong .hline{justify-content:flex-end}
  .hchip{width:clamp(10px,1.5vw,14px);height:clamp(10px,1.5vw,14px);border-radius:4px;
    display:grid;place-items:center;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.32);
    animation:chipIn .3s cubic-bezier(.2,1.5,.45,1)}
  .hchip svg{width:68%;height:68%}
  .team.chung .hchip svg{fill:#134FC4}
  .team.hong  .hchip svg{fill:#B00000}
  .hchip.head{background:linear-gradient(180deg,#FFD35C,#F0A81C)}
  .hchip.head svg{fill:#1A1206}
  .hchip.spin{outline:1.5px solid rgba(26,18,6,.75);outline-offset:1px}
  @keyframes chipIn{0%{transform:scale(0) rotate(-12deg);opacity:0}
    65%{transform:scale(1.22) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
  .hitPop{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);z-index:6;
    width:clamp(80px,18vw,160px);height:clamp(80px,18vw,160px);pointer-events:none;
    animation:hitPop .95s cubic-bezier(.2,.9,.3,1) forwards;filter:drop-shadow(0 6px 18px rgba(0,0,0,.55))}
  .hitPop svg{width:100%;height:100%;fill:#FFC93C}
  .hitRing{position:absolute;top:46%;left:50%;width:clamp(70px,16vw,140px);height:clamp(70px,16vw,140px);
    border-radius:50%;border:5px solid rgba(255,201,60,.95);transform:translate(-50%,-50%);
    pointer-events:none;z-index:5;animation:hitRing .85s ease-out forwards}
  @keyframes hitPop{0%{transform:translate(-50%,-50%) scale(.25) rotate(-18deg);opacity:0}
    20%{transform:translate(-50%,-50%) scale(1.5) rotate(4deg);opacity:1}
    45%{transform:translate(-50%,-50%) scale(1.18) rotate(0);opacity:1}
    100%{transform:translate(-50%,-50%) scale(.34);opacity:0}}
  @keyframes hitRing{0%{transform:translate(-50%,-50%) scale(.3);opacity:.95}
    100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}}
</style>
</head>

      <span class="cat" id="cat"></span>
      <span class="no" id="no"></span>
    </div>
    <div class="banner" id="banner"></div>
    
    <!-- Tombol Switch di Center Atas (Di bawah Banner) -->
    <div class="switch-container">
      <button class="btn-switch" id="btnSwitch">⇄ Switch</button>
    </div>

    <div class="grid" id="mainGrid">
      <!-- SISI KIRI (CHUNG / BLUE) -->
      <div class="team chung" id="teamChung">
        <div class="top">
          <div class="flag-box">
            <img class="img" id="imgChung" alt="">
            <div class="code" id="codeChung"></div>
          </div>
          <div class="info-box">
            <div class="nm" id="nmChung">Chung</div>
            <div class="ctry" id="ctryChung"></div>
          </div>
        </div>
        <div class="sc" id="scChung">0</div>
        <div class="stats" id="statChung"></div>
        <div class="hitrow" id="hitIconChung">
          <div class="hline" data-g="pukulan"></div>
          <div class="hline" data-g="badan"></div>
          <div class="hline" data-g="kepala"></div>
        </div>
      </div>

      <!-- KOTAK TENGAH -->
      <div class="center">
        <div class="match-box">
          <div class="match-title" id="matchCode">A1001</div>
          <div class="match-label">MATCH</div>
        </div>
        <div class="clock-box">
          <div class="clock" id="clock">0:36</div>
        </div>
        <div class="round-box">
          <div class="rnd"><span>1</span> ROUND</div>
        </div>
      </div>

      <!-- SISI KANAN (HONG / RED) -->
      <div class="team hong" id="teamHong">
        <div class="top">
          <div class="flag-box">
            <img class="img" id="imgHong" alt="">
            <div class="code" id="codeHong"></div>
          </div>
          <div class="info-box">
            <div class="nm" id="nmHong">Hong</div>
            <div class="ctry" id="ctryHong"></div>
          </div>
        </div>
        <div class="sc" id="scHong">0</div>
        <div class="stats" id="statHong"></div>
        <div class="hitrow" id="hitIconHong">
          <div class="hline" data-g="pukulan"></div>
          <div class="hline" data-g="badan"></div>
          <div class="hline" data-g="kepala"></div>
        </div>
      </div>
    </div>

    <div class="foot">
      <span class="dot" id="dot"></span><span id="connText">menyambung…</span>
      <span class="brand">idwt.web.id &middot; V1 &middot; &copy;SRISP 2026</span>
    </div>
  </div>

  <!-- status jelas: TIME OUT / KYE-SHI / SIGHAN / JEDA -->
  <div id="statusBar" aria-hidden="true"></div>

  <!-- deklarasi pemenang RONDE (kedip) -->
  <div id="roundFlash" aria-hidden="true">
    <div class="rfName" id="rfName"></div>
    <div class="rfSub" id="rfSub"></div>
  </div>

  <!-- deklarasi pemenang PARTAI (kedip meriah) -->
  <div id="matchFlash" aria-hidden="true">
    <div class="mfLabel">PEMENANG PARTAI</div>
    <div class="mfName" id="mfName"></div>
    <div class="mfSub" id="mfSub"></div>
  </div>

  <!-- menu pertandingan -->
  <button id="btnMenu" aria-label="Menu pertandingan">&#9776; Jadwal</button>
  <div id="menuPanel" aria-hidden="true">
    <div class="mpHead"><span>Menu Pertandingan</span><button id="mpClose" aria-label="Tutup">&times;</button></div>
    <div class="mpBody" id="mpBody"></div>
  </div>

  <button class="sound hide" id="btnSound">🔊 Aktifkan suara</button>

<script type="module">
import { db } from "./firebase-config.js";
import { ref, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const $ = id => document.getElementById(id);

/* waktu SERVER: jam TV/HP penonton sering meleset dari jam operator */
let sOffset = 0;
onValue(ref(db, ".info/serverTimeOffset"), s => { sOffset = s.val() || 0; }, () => {});
const now = () => Date.now() + sOffset;

/* ===== Suara ===== */
let ac=null, soundOn=false;
function initAudio(){
  if (ac){ ac.resume(); soundOn=true; $('btnSound').classList.add('hide'); return; }
  try{ ac=new (window.AudioContext||window.webkitAudioContext)(); soundOn=true; $('btnSound').classList.add('hide'); }catch(e){}
}
$('btnSound').addEventListener('click', initAudio);
$('btnSound').classList.remove('hide');
function nada(f,d,t='sine',v=0.3){ if(!ac||!soundOn)return; const o=ac.createOscillator(),g=ac.createGain();
  o.type=t;o.frequency.value=f;o.connect(g);g.connect(ac.destination);const n=ac.currentTime;
  g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(v,n+0.01);g.gain.exponentialRampToValueAtTime(0.0001,n+d);o.start(n);o.stop(n+d); }
function bunyiPoin(){ nada(880,0.12,'triangle',0.35); setTimeout(()=>nada(1175,0.14,'triangle',0.35),90); }
function bunyiBel(){ nada(300,0.7,'sine',0.4); setTimeout(()=>nada(300,0.7,'sine',0.3),120); }

/* ===== Pengaturan Switch Posisi (Biru/Merah) ===== */
let isSwapped = false;
$('btnSwitch').addEventListener('click', () => {
  isSwapped = !isSwapped;
  $('mainGrid').classList.toggle('swapped', isSwapped);
});

/* ===== Ambil Pertandingan Live ===== */
let KODE=null;
/* URL tamu memakai NOMOR PARTAI (mis. idwt.web.id/#170845), bukan kode pertandingan */
let hashTarget = decodeURIComponent(location.hash.replace(/^#/,"")).trim().toUpperCase() || null;
let pilihManual = false;      // penonton memilih partai sendiri lewat menu Jadwal
let lepasLangganan = [];      // untuk memutus langganan partai sebelumnya
let sudahKoneksi = false;
if (!hashTarget)
  onValue(ref(db,"live"), s=>{ if(pilihManual) return; const k=s.val(); if(k&&k!==KODE)pasang(k); else if(!k){KODE=null;$('live').classList.remove('on');$('wait').style.display='flex';} });
/* cocokkan nomor partai pada URL dengan kode pertandingan (dijalankan saat daftar partai tiba) */
function resolveHash(){
  if(!hashTarget) return;
  for(const c of Object.keys(allMatches)){
    const m = allMatches[c] && allMatches[c].meta;
    if(m && m.no != null && String(m.no).trim().toUpperCase() === hashTarget){ pasang(c); return; }
  }
  if(allMatches[hashTarget]) pasang(hashTarget);   // dukungan link lama berbasis kode
}
window.addEventListener('hashchange', ()=>{
  hashTarget = decodeURIComponent(location.hash.replace(/^#/,"")).trim().toUpperCase() || null;
  resolveHash();
});

let cfg={showNames:true,showImg:true,showCountry:true,showHeader:true,showGamjeom:true,showHits:true,showWon:true,sideSwap:false};
let prev={chung:0,hong:0}, prevRem=null, sudahBel=false, pertama=true, cur=null;

function pasang(kode){
  if(kode===KODE) return;          // sudah menampilkan partai ini
  lepasLangganan.forEach(f=>{ try{ f(); }catch(e){} });   // putus langganan partai lama
  lepasLangganan = [];
  bersihkanTampilan();
  KODE=kode; $('wait').style.display='none'; $('live').classList.add('on');
  if(!sudahKoneksi){ koneksi(); sudahKoneksi = true; }
  lepasLangganan.push(
    onValue(ref(db,`matches/${kode}/meta`), s=>{ if(kode!==KODE) return; renderMeta(s.val()||{}); }));
  lepasLangganan.push(
    onValue(ref(db,`matches/${kode}/config`), s=>{ 
      if(kode!==KODE) return;
      cfg=Object.assign(cfg,s.val()||{}); 
      applyConfig(); 
      if(cfg.sideSwap !== undefined) {
        isSwapped = cfg.sideSwap;
        $('mainGrid').classList.toggle('swapped', isSwapped);
      }
    }));
  lepasLangganan.push(
    onValue(ref(db,`matches/${kode}/state`), s=>{ if(kode!==KODE) return; const st=s.val(); if(st) renderState(st); }));
}
/* hapus sisa tampilan partai sebelumnya agar tidak tercampur */
function bersihkanTampilan(){
  cur=null; prevRem=null; sudahBel=false;
  prev={chung:0,hong:0}; pertama=true;   // jangan bandingkan skor partai baru dgn partai lama
  lastFlashAt=null; sudahMuat=false; matchSuara=false;
  lastHitAt=null; hitRound=null; sudahMuatHit=false;
  const rf=$('roundFlash'), mf=$('matchFlash'), b=$('banner');
  if(rf) rf.className=''; if(mf) mf.className=''; if(b) b.className='banner';
  document.querySelectorAll('.hline').forEach(l=>l.innerHTML='');
}

function renderMeta(m){
  $('cat').textContent = m.category || "";
  $('no').textContent = m.no ? "PARTAI "+m.no : "";
  $('matchCode').textContent = m.no ? String(m.no) : "\u2014";
  
  const c=m.chung||{}, h=m.hong||{};
  $('nmChung').textContent = c.name || "Chung";
  $('nmHong').textContent  = h.name || "Hong";
  $('ctryChung').textContent = c.country || "";
  $('ctryHong').textContent  = h.country || "";
  $('codeChung').textContent = c.code || "";
  $('codeHong').textContent  = h.code || "";
  
  setImg('imgChung', c.img); setImg('imgHong', h.img);
  applyConfig();
}
function setImg(id,url){ const el=$(id); if(url){ el.src=url; el.dataset.has="1"; } else { el.removeAttribute('src'); el.dataset.has=""; } applyConfig(); }

function applyConfig(){
  $('head').classList.toggle('hide', !cfg.showHeader || (!$('cat').textContent && !$('no').textContent));
  ['Chung','Hong'].forEach(s=>{
    $('nm'+s).style.display = cfg.showNames ? "" : "none";
    $('ctry'+s).style.display = cfg.showCountry ? "" : "none";
    const img=$('img'+s); img.classList.toggle('on', cfg.showImg && img.dataset.has==="1");
  });
  renderStats();
}

function renderState(st){
  cur=st;
  if(!pertama){
    if((st.chung||0)>prev.chung){ bump('teamChung'); bunyiPoin(); }
    if((st.hong||0)>prev.hong){ bump('teamHong'); bunyiPoin(); }
  }
  prev={chung:st.chung||0,hong:st.hong||0}; pertama=false;
  $('scChung').textContent=st.chung||0;
  $('scHong').textContent =st.hong||0;
  
  const rBox = document.querySelector('.rnd');
  if(rBox) rBox.innerHTML = `<div class="rn">${st.round||1}</div><div class="rl">RONDE / 3</div>`;

  const b=$('banner');
  if(st.matchOver && st.winner){ b.textContent="PEMENANG: "+(st.winner==="chung"?($('nmChung').textContent):($('nmHong').textContent)); b.className="banner win on"; }
  else b.className="banner";

  renderStatus(st);
  renderDeklarasi(st);
  renderHits(st);
  renderStats();
  renderClock();
}

/* ===== ikon rekaman pukulan di bilah + animasi kepala ===== */
const SVG_HEAD = '<svg viewBox="0 0 24 24"><path d="M12 2.6c-3.9 0-6.7 2.7-6.7 6.3 0 2.6 1.3 4.7 3.2 6l.5 3.3c.1.8.8 1.4 1.6 1.4h2.8c.8 0 1.5-.6 1.6-1.4l.5-3.3c1.9-1.3 3.2-3.4 3.2-6 0-3.6-2.8-6.3-6.7-6.3z"/></svg>';
const SVG_BODY = '<svg viewBox="0 0 24 24"><path d="M8.6 3 12 4.8 15.4 3l3.5 2.2-1.5 4.4v7.6c0 1.5-1.2 2.8-2.8 2.8H9.4c-1.5 0-2.8-1.2-2.8-2.8V9.6L5.1 5.2 8.6 3z"/></svg>';
const SVG_FIST = '<svg viewBox="0 0 24 24"><path d="M6.7 8.3h8.9c1.7 0 3.1 1.4 3.1 3.1v3.3c0 2.1-1.7 3.8-3.8 3.8H8.7c-2.1 0-3.8-1.7-3.8-3.8v-4.7c0-.9.8-1.7 1.8-1.7z"/><rect x="7.3" y="5.1" width="8.3" height="3.5" rx="1.75"/></svg>';
function ikonHit(tech){
  if (tech==='kepala' || tech==='putar_kepala') return SVG_HEAD;
  if (tech==='badan'  || tech==='putar_badan')  return SVG_BODY;
  return SVG_FIST;   // pukulan / lainnya
}
let lastHitAt=null, hitRound=null, sudahMuatHit=false;
function renderHits(st){
  // reset ikon tiap ronde baru
  if (st.round !== hitRound){
    document.querySelectorAll('.hline').forEach(l => l.innerHTML = '');
    hitRound = st.round;
  }
  if (st.lastHit && st.lastHit.at !== lastHitAt){
    if (sudahMuatHit) tambahHit(st.lastHit.side, st.lastHit.tech);
    lastHitAt = st.lastHit.at;
  }
  sudahMuatHit = true;
}
function grupHit(tech){
  if (tech==='kepala' || tech==='putar_kepala') return 'kepala';
  if (tech==='badan'  || tech==='putar_badan')  return 'badan';
  return 'pukulan';
}
function tambahHit(side, tech){
  const box = side==='chung' ? $('hitIconChung') : $('hitIconHong');
  if(!box) return;
  const grup = grupHit(tech);
  const line = box.querySelector('.hline[data-g="' + grup + '"]');
  if(!line) return;
  const head = (grup === 'kepala');
  const spin = String(tech||'').indexOf('putar_') === 0;
  const chip = document.createElement('span');
  chip.className = 'hchip' + (head ? ' head' : '') + (spin ? ' spin' : '');
  chip.innerHTML = ikonHit(tech);
  line.appendChild(chip);
  while (line.children.length > 18) line.removeChild(line.firstChild);
  if (head) popKepala(side);
}
function popKepala(side){
  const panel = side==='chung' ? $('teamChung') : $('teamHong');
  if(!panel) return;
  const ring = document.createElement('div');
  ring.className = 'hitRing';
  const pop = document.createElement('div');
  pop.className = 'hitPop';
  pop.innerHTML = SVG_HEAD;
  panel.appendChild(ring); panel.appendChild(pop);
  setTimeout(()=>{ ring.remove(); }, 880);
  setTimeout(()=>{ pop.remove(); }, 980);
}

/* ===== status jelas: TIME OUT / KYE-SHI / SIGHAN / JEDA ===== */
function renderStatus(st){
  const el=$('statusBar'); if(!el) return;
  el.classList.remove('pause');
  if(st.phase==="break"){ el.textContent = st.breakLabel || "TIME OUT"; el.classList.add('on'); }
  else if(st.phase==="paused"){ el.textContent = "JEDA"; el.classList.add('on','pause'); }
  else { el.classList.remove('on'); }
}

/* ===== label jenis kemenangan (singkatan) ===== */
function typeLabel(t){
  return ({PTS:'MENANG POIN',PTG:'POINT GAP',PUN:'PUN · 5 GAM-JEOM',SUP:'SUP · KEUNGGULAN',
           RSC:'RSC · WASIT HENTIKAN',WDR:'WDR · MUNDUR',DSQ:'DSQ · DISKUALIFIKASI'})[t] || (t||'MENANG');
}

/* ===== deklarasi pemenang RONDE (kedip) & PARTAI (kedip meriah) ===== */
let lastFlashAt=null, sudahMuat=false, matchSuara=false, flashTimer=null;
function renderDeklarasi(st){
  if(st.matchOver && st.winner){
    tampilkanMenangPartai(st);
    if(st.lastRound) lastFlashAt = st.lastRound.at;
    sudahMuat = true;
    return;
  }
  $('matchFlash').className=""; matchSuara=false;
  if(st.lastRound && st.lastRound.at !== lastFlashAt){
    if(sudahMuat) flashRonde(st.lastRound);
    lastFlashAt = st.lastRound.at;
  }
  sudahMuat = true;
}
function flashRonde(lr){
  const w = lr.winner;
  const nm = w==="chung" ? $('nmChung').textContent : $('nmHong').textContent;
  $('rfName').textContent = nm;
  $('rfSub').textContent  = `RONDE ${lr.round} — ${typeLabel(lr.type)}`;
  const el=$('roundFlash'); el.className = "on "+w;
  bunyiPoin();
  clearTimeout(flashTimer);
  flashTimer = setTimeout(()=>{ el.className=""; }, 5000);
}
function tampilkanMenangPartai(st){
  const w=st.winner;
  const nm = w==="chung" ? $('nmChung').textContent : $('nmHong').textContent;
  const wc=st.wonChung||0, wh=st.wonHong||0;
  const tally = w==="chung" ? `${wc}-${wh}` : `${wh}-${wc}`;
  $('mfName').textContent = nm;
  $('mfSub').textContent  = `${typeLabel(st.winType)} · MENANG ${tally}`;
  $('roundFlash').className="";
  const el=$('matchFlash'); el.className = "on "+w;
  if(!matchSuara){ bunyiBel(); matchSuara=true; }
}

function renderStats(){
  const st=cur||{};
  const build = side => {
    let h="";
    if(cfg.showGamjeom) h+=`<div class="stat"><div class="k">Gam-jeom</div><div class="v">${st['gamjeom'+cap(side)]||0}</div></div>`;
    if(cfg.showHits)    h+=`<div class="stat"><div class="k">Hits</div><div class="v">${st['hits'+cap(side)]||0}</div></div>`;
    if(cfg.showWon)     h+=`<div class="stat won"><div class="k">#Won</div><div class="v">${st['won'+cap(side)]||0}</div></div>`;
    return h;
  };
  $('statChung').innerHTML=build('chung');
  $('statHong').innerHTML =build('hong');
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function fmt(sec){ const m=Math.floor(sec/60); return `${m}:${String(sec%60).padStart(2,'0')}`; }
function renderClock(){
  const s=cur; if(!s)return;
  let sec = s.phase==="running" ? Math.max(0,Math.round((s.endAt-now())/1000)) : (s.remaining??0);
  if(prevRem!==null && prevRem>0 && sec===0 && s.phase==="running" && !sudahBel){ bunyiBel(); sudahBel=true; }
  if(sec>0) sudahBel=false; prevRem=sec;
  const c=$('clock'); c.textContent=fmt(sec); c.classList.toggle('brk', s.phase==="break");
}
setInterval(renderClock,250);

function bump(id){ const el=$(id); el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
function koneksi(){ onValue(ref(db,".info/connected"), s=>{ const on=s.val()===true; $('dot').classList.toggle('on',on); $('connText').textContent=on?"tersambung":"terputus"; }); }

/* ===== Menu Pertandingan: Akan / Sedang / Sudah Bertanding ===== */
const esc = t => String(t==null?'':t).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
let allMatches={}, allResults={}, liveKode=null;
onValue(ref(db,"live"),    s=>{ liveKode = s.val()||null; renderMenu(); }, ()=>{});
onValue(ref(db,"matches"), s=>{ allMatches = s.val()||{}; renderMenu(); resolveHash(); },
        ()=>{ if(hashTarget) pasang(hashTarget); });   // cadangan bila daftar partai tak boleh dibaca
onValue(ref(db,"results"), s=>{ allResults = s.val()||{}; renderMenu(); }, ()=>{});

function statusPartai(code){
  if(allResults[code]) return "sudah";
  if(code===liveKode)  return "sedang";
  return "akan";
}
function chip(sd, d){
  d=d||{};
  const nm = d.name || (sd==='chung'?'Chung':'Hong');
  const ct = d.country ? ` · ${d.country}` : '';
  return `<span class="mpChip ${sd}">${esc(nm)}${esc(ct)}</span>`;
}
let daftarMenu = [];
function renderMenu(){
  const body=$('mpBody'); if(!body) return;
  daftarMenu = [];
  const codes=Object.keys(allMatches);
  const buckets={sedang:[],akan:[],sudah:[]};
  codes.forEach(c=>{ buckets[statusPartai(c)].push(c); });
  const noOf = c => (allMatches[c] && allMatches[c].meta && +allMatches[c].meta.no) || 0;
  const byNo = (a,b) => noOf(a)-noOf(b);
  buckets.sedang.sort(byNo); buckets.akan.sort(byNo); buckets.sudah.sort(byNo);

  let html='';
  const seksi=(judul,arr,cls)=>{
    if(!arr.length) return;
    html+=`<div class="mpSec ${cls}">${judul} <b>${arr.length}</b></div>`;
    arr.forEach(c=>{
      const m=(allMatches[c] && allMatches[c].meta) || {};
      const head=[m.no?`PARTAI ${esc(m.no)}`:'',esc(m.category||'')].filter(Boolean).join(' · ')||'—';
      let ket='';
      if(cls==='sudah'){
        const r=allResults[c]||{};
        const w=r.winner==='chung'?(r.chungName||'Chung'):(r.hongName||'Hong');
        const wc=r.wonChung||0, wh=r.wonHong||0;
        const tally=r.winner==='chung'?`${wc}-${wh}`:`${wh}-${wc}`;
        ket=`<div class="mpKet">🏆 ${esc(w)} menang ${tally}${r.winType?` · ${esc(r.winType)}`:''}</div>`;
      } else if(cls==='sedang'){
        ket=`<div class="mpKet live">● Sedang berlangsung</div>`;
      } else {
        ket=`<div class="mpKet">Belum dimulai</div>`;
      }
      const idx = daftarMenu.push({ code:c, no:(m.no==null?'':String(m.no)) }) - 1;
      const kini = (c===KODE);
      const tanda = kini ? '<span class="mpNow">SEDANG DITAMPILKAN</span>' : '';
      html+=`<div class="mpItem ${cls}${kini?' kini':''}" data-i="${idx}"><div class="mpTop">${tanda}${head}</div>`+
            `<div class="mpVs">${chip('chung',m.chung)}<span class="mpx">vs</span>${chip('hong',m.hong)}</div>`+
            `${ket}</div>`;
    });
  };
  seksi('🔴 Sedang Bertanding', buckets.sedang, 'sedang');
  seksi('🟡 Akan Bertanding',  buckets.akan,   'akan');
  seksi('✅ Sudah Bertanding',  buckets.sudah,  'sudah');
  body.innerHTML = html || '<div class="mpEmpty">Belum ada pertandingan.</div>';
}
$('btnMenu').addEventListener('click', ()=>{ renderMenu(); $('menuPanel').classList.add('on'); });
$('mpClose').addEventListener('click', ()=> $('menuPanel').classList.remove('on'));
/* klik partai di jadwal → langsung tampilkan halaman live partai tersebut */
$('mpBody').addEventListener('click', e=>{
  const it = e.target.closest('.mpItem'); if(!it) return;
  const d = daftarMenu[+it.dataset.i]; if(!d) return;
  $('menuPanel').classList.remove('on');
  // memilih partai yang sedang live = kembali mengikuti operator; partai lain = tetap terkunci
  pilihManual = (d.code !== liveKode);
  if(d.no){
    hashTarget = d.no.trim().toUpperCase();
    location.hash = d.no;                  // link tetap memakai nomor partai
  }else{
    hashTarget = null;                     // partai tanpa nomor: jangan taruh kode di URL
    if(location.hash) history.replaceState(null,'',location.pathname+location.search);
  }
  pasang(d.code);
  renderMenu();
});
$('menuPanel').addEventListener('click', e=>{ if(e.target===$('menuPanel')) $('menuPanel').classList.remove('on'); });
</script>

<script>
/* Layar penuh: ketukan pertama menyembunyikan bilah alamat browser */
(function(){
  function masukFS(){
    if (document.fullscreenElement || document.webkitFullscreenElement) return;
    var el = document.documentElement;
    var req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) { try { req.call(el); } catch(e){} }
  }
  document.addEventListener('click', masukFS, {passive:true});
  document.addEventListener('touchend', masukFS, {passive:true});
})();
</script>
<script>
/* ===== layar tidak padam selama halaman terbuka (skrip biasa, tanpa module) ===== */
(function(){
  var kunci = null;
  function minta(){
    try{
      if (!('wakeLock' in navigator)) return;
      navigator.wakeLock.request('screen').then(function(k){
        kunci = k;
        k.addEventListener('release', function(){ kunci = null; });
      }).catch(function(){});
    }catch(e){}
  }
  minta();
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'visible' && !kunci) minta();
  });
  document.addEventListener('pointerdown', function(){ if (!kunci) minta(); });
})();
</script>
</body>
