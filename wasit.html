<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wasit — Skor Taekwondo</title>
<style>
  :root{
    --bg:#0E1116;--panel:#171C24;--line:#2A3242;
    --chung:#1E6FD9;--hong:#D9261E;--ink:#F2F5FA;--mut:#8A94A6;--gold:#F5B325;--ok:#25C26E;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;touch-action:manipulation}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       display:flex;flex-direction:column;height:100dvh;user-select:none}
  .hidden{display:none !important}

  /* masuk */
  .gate{flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px;padding:24px;max-width:420px;margin:0 auto;width:100%}
  .gate h1{font-size:22px;font-weight:800}
  .gate p{color:var(--mut);font-size:14px;line-height:1.5}
  label{display:block;font-size:12px;color:var(--mut);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
  input{width:100%;padding:14px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:16px;text-transform:uppercase;letter-spacing:.1em;font-weight:700}
  .pick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .pick button{padding:16px;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--ink);font-size:16px;font-weight:800}
  .pick button.on{background:var(--gold);color:#1A1206;border-color:var(--gold)}
  .primary{width:100%;padding:15px;border:none;border-radius:10px;background:var(--ok);color:#08130C;font-size:16px;font-weight:800;margin-top:6px}
  .err{color:var(--hong);font-size:13px;min-height:18px}

  /* layar wasit */
  .bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--panel);border-bottom:1px solid var(--line);font-size:12px;color:var(--mut)}
  .bar b{color:var(--ink)}
  .bar .conn{margin-left:auto;display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--mut)}
  .dot.on{background:var(--ok)}
  .status{text-align:center;padding:8px;font-size:13px;font-weight:700;color:var(--mut);border-bottom:1px solid var(--line);min-height:36px;transition:background .12s,color .12s}
  .status.reg{color:#0E1116;background:var(--gold)}
  .status.valid{color:#08130C;background:var(--ok)}

  /* ===== BODI STIK ===== */
  .pad{flex:1;position:relative;margin:10px;min-height:0;overflow:hidden;
       border-radius:22px;border:7px solid #07090C;
       display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:10px 8px 14px;
       background:
         radial-gradient(rgba(255,255,255,.055) 1px, transparent 1.5px) 0 0/7px 7px,
         radial-gradient(ellipse 300px 130px at 15% 18%, #262B33 0%, transparent 60%),
         radial-gradient(ellipse 340px 150px at 82% 34%, #14171D 0%, transparent 60%),
         radial-gradient(ellipse 380px 160px at 38% 72%, #272C35 0%, transparent 60%),
         radial-gradient(ellipse 300px 140px at 86% 86%, #171A20 0%, transparent 60%),
         #1C2027;
       box-shadow:inset 0 0 34px rgba(0,0,0,.75), 0 6px 18px rgba(0,0,0,.5)}
  .pad .lcd{position:absolute;left:50%;top:37%;transform:translate(-50%,-50%);
       font:700 10px "Courier New",monospace;letter-spacing:.28em;color:#E8EDF5;
       text-shadow:0 0 6px rgba(255,255,255,.35);opacity:.75;pointer-events:none;white-space:nowrap;z-index:0}
  .col{display:flex;flex-direction:column;justify-content:space-between;gap:6px;min-height:0;position:relative;z-index:1}
  .col .head{text-align:center;font-size:9px;letter-spacing:.3em;color:#6D7686;text-transform:uppercase}

  /* tombol bundar: cincin krom + muka mengilap */
  .pbtn{border:none;border-radius:50%;padding:5px;display:block;aspect-ratio:1;touch-action:manipulation;
        background:conic-gradient(from 210deg,#FDFDFD,#98A0AA 25%,#E9EDF2 50%,#8B929C 72%,#FDFDFD);
        box-shadow:0 6px 14px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.3)}
  .pbtn .face{width:100%;height:100%;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;
        color:#fff;font-family:Georgia,'Times New Roman',serif;font-style:italic;font-weight:800;line-height:1;
        text-shadow:0 2px 3px rgba(0,0,0,.45);
        box-shadow:inset 0 -12px 18px rgba(0,0,0,.42), inset 0 3px 6px rgba(255,255,255,.35)}
  .col.hong  .face{background:radial-gradient(circle at 32% 26%, rgba(255,255,255,.95) 0%, rgba(255,255,255,.12) 30%, rgba(255,255,255,0) 42%),
                              radial-gradient(circle at 50% 62%, #EF4136 0%, #C3170D 55%, #7C0B05 100%)}
  .col.chung .face{background:radial-gradient(circle at 32% 26%, rgba(255,255,255,.95) 0%, rgba(255,255,255,.12) 30%, rgba(255,255,255,0) 42%),
                              radial-gradient(circle at 50% 62%, #3B8BF2 0%, #1660C9 55%, #0A3A85 100%)}

  .pbtn.lg{width:min(clamp(120px,40vw,175px),24dvh)}
  .pbtn.md{width:min(clamp(88px,30vw,132px),18dvh)}
  .pbtn.sm{width:min(clamp(62px,20vw,88px),11dvh)}
  .pbtn.lg .face{font-size:clamp(54px,16vw,82px)}
  .pbtn.md .face{font-size:clamp(38px,11vw,56px)}
  .pbtn.sm .face{font-style:normal;font-family:system-ui,-apple-system,sans-serif;font-weight:900;font-size:clamp(26px,9vw,40px)}
  .pv{font:700 10px system-ui,-apple-system,sans-serif;font-style:normal;letter-spacing:.05em;min-height:11px;margin-top:1px}

  /* posisi mengikuti gambar: 3 luar, + dalam, 2 luar, 1 dalam */
  .col.hong  .pos-a{align-self:flex-start;margin-left:2%}
  .col.hong  .pos-b{align-self:flex-end;margin-right:16%}
  .col.hong  .pos-c{align-self:flex-start}
  .col.hong  .pos-d{align-self:flex-end;margin-right:4%}
  .col.chung .pos-a{align-self:flex-end;margin-right:2%}
  .col.chung .pos-b{align-self:flex-start;margin-left:16%}
  .col.chung .pos-c{align-self:flex-end}
  .col.chung .pos-d{align-self:flex-start;margin-left:4%}

  .pbtn:not(.off):active{transform:translateY(2px)}
  .pbtn:not(.off):active .face{filter:brightness(1.3)}

  /* tombol +: mati sampai 2/3 ditekan */
  .pbtn.plus{transition:filter .15s}
  .pbtn.plus.off{filter:grayscale(1) brightness(.5)}
  .pbtn.plus.on{animation:armPulse .9s ease-in-out infinite}
  @keyframes armPulse{
    0%,100%{box-shadow:0 6px 14px rgba(0,0,0,.6), 0 0 0 0 rgba(245,179,37,0)}
    50%{box-shadow:0 6px 14px rgba(0,0,0,.6), 0 0 18px 6px rgba(245,179,37,.55)}
  }
  @media (prefers-reduced-motion:reduce){
    .pbtn.plus.on{animation:none;box-shadow:0 6px 14px rgba(0,0,0,.6), 0 0 14px 4px rgba(245,179,37,.5)}
  }

  /* tombol keluar + modal */
  .exit{margin-left:8px;background:none;border:1px solid var(--line);color:var(--mut);
        border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700}
  .exit.hide{display:none}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:24px;z-index:20}
  .modal.on{display:flex}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;max-width:340px;width:100%;text-align:center}
  .modal .box p{font-size:15px;line-height:1.5;margin-bottom:16px}
  .modal .box .btns{display:flex;gap:8px}
  .modal .box button{flex:1;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700}
  .modal .box .yes{background:var(--hong);color:#fff}
  .modal .box .no{background:var(--line);color:var(--ink)}
  .modal .box .ok{background:var(--gold);color:#1A1206}
</style>
</head>
<body>

<div id="tkdLoader">
  <div class="tkd-spin">
    <svg viewBox="0 0 100 100" width="86" height="86" aria-hidden="true">
      <circle cx="50" cy="50" r="48" fill="#1E6FD9"/>
      <path d="M50,2 A48,48 0 0,1 50,98 A24,24 0 0,1 50,50 A24,24 0 0,0 50,2 Z" fill="#D9261E"/>
      <circle cx="50" cy="26" r="7.5" fill="#1E6FD9"/>
      <circle cx="50" cy="74" r="7.5" fill="#D9261E"/>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#fff" stroke-width="2.5"/>
    </svg>
  </div>
  <div class="tkd-txt">LIVE TAEKWONDO</div>
</div>
<style>
#tkdLoader{position:fixed;inset:0;background:#0B0E13;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;z-index:99999;transition:opacity .45s}
#tkdLoader.out{opacity:0;pointer-events:none}
#tkdLoader .tkd-spin{animation:tkdSpin 1s cubic-bezier(.5,.05,.4,.95) infinite;filter:drop-shadow(0 6px 18px rgba(0,0,0,.5))}
@keyframes tkdSpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
#tkdLoader .tkd-txt{font:800 12px system-ui,-apple-system,sans-serif;letter-spacing:.35em;color:#F5B325;animation:tkdPulse 1s ease-in-out infinite}
@keyframes tkdPulse{0%,100%{opacity:.5}50%{opacity:1}}
</style>
<script>window.addEventListener('load',function(){setTimeout(function(){var l=document.getElementById('tkdLoader');if(l){l.classList.add('out');setTimeout(function(){l.remove();},480);}},650);});</script>


  <!-- ===== MASUK ===== -->
  <div class="gate" id="gate">
    <h1>Wasit</h1>
    <p>Masukkan kode pertandingan dari operator, lalu pilih nomor kursimu.</p>
    <div>
      <label>Kode Pertandingan</label>
      <input id="codeInput" type="text" placeholder="TKD-1234" autocomplete="off">
    </div>
    <div>
      <label>Nomor Wasit</label>
      <div class="pick" id="pick">
        <button data-j="1">1</button>
        <button data-j="2">2</button>
        <button data-j="3">3</button>
      </div>
    </div>
    <div class="err" id="gateErr"></div>
    <button class="primary" id="btnEnter">Mulai Bertugas</button>
  </div>

  <!-- ===== LAYAR WASIT ===== -->
  <div class="hidden" id="screen" style="flex:1;display:flex;flex-direction:column;min-height:0">
    <div class="bar">
      Kode <b id="codeView">—</b> · W<b id="jView">—</b> · R<b id="roundView">–</b> · <b id="clockView">–:––</b>
      <span class="conn"><span class="dot" id="connDot"></span><span id="connText">…</span></span>
      <button class="exit" id="btnExit">Keluar</button>
    </div>
    <div class="status" id="status">Tekan saat serangan sah</div>
    <div class="pad">
      <div class="lcd">WORLD&nbsp;TAEKWONDO</div>
      <div class="col hong"  id="colHong"><div class="head">Hong</div></div>
      <div class="col chung" id="colChung"><div class="head">Chung</div></div>
    </div>
  </div>

  <!-- modal konfirmasi keluar -->
  <div class="modal" id="modal">
    <div class="box">
      <p id="modalMsg">Keluar dari tugas wasit?</p>
      <div class="btns" id="modalBtns"></div>
    </div>
  </div>

<script type="module">
import { db } from "./firebase-config.js";
import { ref, push, onValue, get, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

/* ===== PENGATURAN TOMBOL (+) — mudah diubah ===== */
const PLUS_AKTIF_MS = 3000;                 // lama tombol + menyala setelah tekan 2/3 (ms)
const PLUS_BONUS = { badan:2, kepala:2 };   // peraturan terbaru? ubah kepala jadi 3 → putar ke kepala +3

/* susunan tombol mengikuti gambar stik: 3 (atas), +, 2, 1 (bawah, terbesar) */
const LAYOUT = [
  { key:'kepala',  label:'3', size:'md', pos:'a' },
  { key:'plus',    label:'+', size:'sm', pos:'b' },
  { key:'badan',   label:'2', size:'md', pos:'c' },
  { key:'pukulan', label:'1', size:'lg', pos:'d' },
];

const $ = id => document.getElementById(id);
let KODE = "", JUDGE = 0;

/* pilih nomor wasit */
let picked = 0;
$('pick').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  picked = Number(b.dataset.j);
  [...$('pick').children].forEach(x => x.classList.toggle('on', x===b));
});

$('btnEnter').addEventListener('click', async () => {
  const kode = $('codeInput').value.trim().toUpperCase();
  $('gateErr').textContent = "";
  if (!kode){ $('gateErr').textContent = "Isi kode pertandingan."; return; }
  if (!picked){ $('gateErr').textContent = "Pilih nomor wasit."; return; }
  await coba(kode, picked);
});

// cek pertandingan benar-benar ada (dibuat operator) sebelum masuk
async function coba(kode, judge){
  $('gateErr').textContent = "Memeriksa kode…";
  let ada = false;
  try{
    const snap = await get(ref(db, `matches/${kode}/state`));
    ada = snap.exists();
  }catch(e){ $('gateErr').textContent = "Gagal menghubungi server."; return; }
  if (!ada){ $('gateErr').textContent = "Kode tidak ditemukan. Minta kode ke operator."; return; }
  KODE = kode; JUDGE = judge;
  location.hash = `${KODE}.${JUDGE}`;   // agar refresh menyambung lagi
  masuk();
}

function masuk(){
  $('gate').classList.add('hidden');
  $('screen').classList.remove('hidden');
  $('codeView').textContent = KODE;
  $('jView').textContent = JUDGE;
  buatTombol();
  pantauKoneksi();
  dengarValid();
  dengarWaktu();
  wakeLock();
  pasangBack();
}

// coba masuk otomatis dari URL saat refresh: #KODE.NOMOR
async function autoMasuk(){
  const h = decodeURIComponent(location.hash.replace(/^#/, ""));
  const m = h.match(/^(.+)\.([123])$/);
  if (!m) return;
  await coba(m[1].toUpperCase(), Number(m[2]));
}

/* tombol */
function buatTombol(){
  [['hong','colHong'],['chung','colChung']].forEach(([side,colId]) => {
    const col = $(colId);
    LAYOUT.forEach(t => {
      const b = document.createElement('button');
      b.className = `pbtn ${t.size} pos-${t.pos}` + (t.key==='plus' ? ' plus off' : '');
      b.innerHTML = `<span class="face">${t.label}${t.key==='plus' ? '<small class="pv"></small>' : ''}</span>`;
      if (t.key === 'plus'){
        b.id = `plus-${side}`;
        b.addEventListener('click', () => tekanPlus(side));
      } else {
        b.addEventListener('click', () => tekan(side, t.key));
      }
      col.appendChild(b);
    });
  });
}

function getar(p){ if (navigator.vibrate) navigator.vibrate(p); }

function tekan(side, techId){
  getar(30);                        // konfirmasi pencet terdaftar
  statusFlash('Terdaftar', 'reg');
  push(ref(db, `matches/${KODE}/presses`), {
    judge: JUDGE, side, tech: techId, t: serverTimestamp()
  });
  // logika (+): 2/3 mengaktifkan tombol +, 1 mematikannya
  if (techId === 'badan' || techId === 'kepala') aktifkanPlus(side, techId);
  else matikanPlus(side);
}

/* ===== logika tombol (+) ===== */
const plusState = { hong:{dasar:null,timer:null}, chung:{dasar:null,timer:null} };

function aktifkanPlus(side, dasar){
  const s = plusState[side];
  clearTimeout(s.timer);
  s.dasar = dasar;
  const el = $(`plus-${side}`);
  el.classList.remove('off'); el.classList.add('on');
  el.querySelector('.pv').textContent = `+${PLUS_BONUS[dasar]}`;
  s.timer = setTimeout(() => matikanPlus(side), PLUS_AKTIF_MS);
}

function matikanPlus(side){
  const s = plusState[side];
  clearTimeout(s.timer);
  s.dasar = null; s.timer = null;
  const el = $(`plus-${side}`); if (!el) return;
  el.classList.add('off'); el.classList.remove('on');
  el.querySelector('.pv').textContent = '';
}

function tekanPlus(side){
  const s = plusState[side];
  if (!s.dasar) return;             // belum aktif: abaikan
  const dasar = s.dasar, pts = PLUS_BONUS[dasar];
  getar(30);
  statusFlash(`Putar +${pts} terdaftar`, 'reg');
  push(ref(db, `matches/${KODE}/presses`), {
    judge: JUDGE, side, tech: `plus_${dasar}`, pts, t: serverTimestamp()
  });
  matikanPlus(side);                // satu konfirmasi per teknik
}

let stTimer = null;
function statusFlash(teks, cls){
  const el = $('status');
  el.textContent = teks;
  el.classList.remove('reg','valid'); el.classList.add(cls);
  clearTimeout(stTimer);
  stTimer = setTimeout(() => { el.classList.remove('reg','valid'); el.textContent = 'Tekan saat serangan sah'; }, 450);
}

/* getar dobel saat operator sahkan poin (tanpa angka) */
let lastValidSeen = 0;
function dengarValid(){
  onValue(ref(db, `matches/${KODE}/state/lastValid`), snap => {
    const v = snap.val() || 0;
    if (v && v !== lastValidSeen){
      lastValidSeen = v;
      getar([30,40,30]);
      statusFlash('Poin sah', 'valid');
    }
  });
}

/* tampilkan ronde + waktu dari operator (tanpa skor) sebagai bukti terhubung */
function fmt(s){ const m=Math.floor(s/60); return `${m}:${String(s%60).padStart(2,'0')}`; }
let stateWaktu = null;
function dengarWaktu(){
  onValue(ref(db, `matches/${KODE}/state`), snap => {
    stateWaktu = snap.val() || null;
    if (stateWaktu) $('roundView').textContent = stateWaktu.round || 1;
    // kunci: saat pertandingan berjalan, tombol keluar disembunyikan
    $('btnExit').classList.toggle('hide', stateWaktu && stateWaktu.phase === "running");
    renderWaktu();
  });
  setInterval(renderWaktu, 250);
}
function renderWaktu(){
  if (!stateWaktu){ $('clockView').textContent = "–:––"; return; }
  let s;
  if (stateWaktu.phase === "running") s = Math.max(0, Math.round((stateWaktu.endAt - Date.now())/1000));
  else s = stateWaktu.remaining ?? 0;
  $('clockView').textContent = fmt(s);
}

function pantauKoneksi(){
  onValue(ref(db, ".info/connected"), snap => {
    const on = snap.val() === true;
    $('connDot').classList.toggle('on', on);
    $('connText').textContent = on ? "tersambung" : "terputus";
  });
}

/* jaga layar tetap menyala */
async function wakeLock(){
  try{ if ('wakeLock' in navigator){ await navigator.wakeLock.request('screen'); } }catch(e){}
}
document.addEventListener('visibilitychange', () => { if (document.visibilityState==='visible') wakeLock(); });

/* ====== keluar / tombol back ====== */
const sedangBerjalan = () => stateWaktu && stateWaktu.phase === "running";

function tutupModal(){ $('modal').classList.remove('on'); }
function keluarSekarang(){
  location.hash = "";
  location.reload();
}
function mintaKeluar(){
  if (sedangBerjalan()){
    // terkunci: tidak boleh keluar saat pertandingan berjalan
    $('modalMsg').textContent = "Pertandingan sedang berjalan. Tidak bisa keluar sampai waktu dijeda operator.";
    $('modalBtns').innerHTML = `<button class="ok" id="mOk">Mengerti</button>`;
    $('modal').classList.add('on');
    $('mOk').onclick = tutupModal;
    return;
  }
  $('modalMsg').textContent = "Keluar dari tugas wasit?";
  $('modalBtns').innerHTML = `<button class="no" id="mNo">Batal</button><button class="yes" id="mYes">Keluar</button>`;
  $('modal').classList.add('on');
  $('mNo').onclick = tutupModal;
  $('mYes').onclick = keluarSekarang;
}
$('btnExit').addEventListener('click', mintaKeluar);

/* cegat tombol back HP */
function pasangBack(){
  history.pushState({ wasit:true }, "");
  window.addEventListener('popstate', () => {
    history.pushState({ wasit:true }, ""); // tetap di halaman
    mintaKeluar();
  });
}

autoMasuk();   // sambung ulang otomatis jika ada kode di URL
</script>
<div style="position:fixed;left:8px;bottom:6px;font-size:10px;color:#5a6472;letter-spacing:.08em;z-index:5;pointer-events:none">V1 &middot; &copy;SRISP 2026</div>
</body>
</html>
