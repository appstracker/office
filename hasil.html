<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasil Pertandingan — Live Taekwondo</title>
<style>
  :root{--bg:#0E1116;--panel:#171C24;--line:#2A3242;--chung:#1E6FD9;--hong:#D9261E;
        --ink:#F2F5FA;--mut:#95a0b3;--gold:#F5B325;--ok:#25C26E}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       min-height:100dvh;padding:18px;max-width:640px;margin:0 auto}
  h1{font-size:20px;font-weight:800}
  .sub{color:var(--mut);font-size:13px;margin-bottom:14px}
  .gate{display:flex;flex-direction:column;justify-content:center;min-height:80dvh;gap:12px}
  label{display:block;font-size:12px;color:var(--mut);margin-bottom:4px}
  input{width:100%;padding:12px;border-radius:9px;border:1px solid var(--line);background:#0E1116;color:var(--ink);font-size:15px}
  .btn{border:none;border-radius:10px;padding:13px 16px;font-size:15px;font-weight:700;color:var(--ink);background:var(--line)}
  .btn.go{background:var(--ok);color:#08130C}
  .btn.gold{background:var(--gold);color:#1A1206}
  .btn:active{filter:brightness(1.35)}
  .hidden{display:none !important}
  .msg{font-size:13px;min-height:18px;color:var(--hong)}
  .top{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .top h1{flex:1}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px}
  .card .hd{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .card .no{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.06em}
  .card .cat{font-size:12px;color:var(--mut)}
  .card .vs{font-size:15px;font-weight:700;margin:4px 0}
  .card .vs .c{color:#7FB2F2}.card .vs .h{color:#F29B96}
  .card .res{font-size:13px;color:var(--mut)}
  .card .res b{color:var(--ok)}
  .card .foot{display:flex;align-items:center;gap:8px;margin-top:10px}
  .card .time{font-size:11px;color:var(--mut);flex:1}
  .empty{color:var(--mut);text-align:center;padding:40px 0;font-size:14px}
</style>
</head>
<body>

  <!-- gerbang -->
  <div class="gate" id="gate">
    <h1>Hasil Pertandingan</h1>
    <div class="sub">Halaman penyelenggara. Masuk untuk melihat & mengunduh rekor.</div>
    <div><label>Password operator</label><input id="pass" type="password" placeholder="••••••" autocomplete="current-password"></div>
    <div class="msg" id="gateErr"></div>
    <button class="btn go" id="btnGate">Masuk</button>
  </div>

  <!-- daftar -->
  <div class="hidden" id="app">
    <div class="top">
      <h1>Hasil Pertandingan</h1>
      <button class="btn" id="btnRefresh">Muat ulang</button>
      <button class="btn gold" id="btnRekap">Rekap PDF</button>
    </div>
    <div id="list"><div class="empty">Memuat…</div></div>
  </div>

<!-- jsPDF (dibuat di browser, tanpa server) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script type="module">
import { db, auth } from "./firebase-config.js";
import { ref, get, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";
import { signInWithEmailAndPassword, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const EMAIL_ADMIN = "admin@idwt.web.id";
const $ = id => document.getElementById(id);

/* gerbang login */
$('btnGate').addEventListener('click', async () => {
  if (auth.currentUser){ buka(); return; }
  const pass = $('pass').value;
  if (!pass){ $('gateErr').textContent = "Masukkan password."; return; }
  $('gateErr').textContent = "Masuk…";
  try{ await signInWithEmailAndPassword(auth, EMAIL_ADMIN, pass); }
  catch(e){ $('gateErr').textContent = "Password salah."; return; }
  buka();
});
$('pass').addEventListener('keydown', e => { if (e.key==='Enter') $('btnGate').click(); });
onAuthStateChanged(auth, u => { if (u && !$('app').classList.contains('shown')) { /* biar tombol yang buka */ } });

function buka(){ $('gate').classList.add('hidden'); $('app').classList.remove('hidden'); $('app').classList.add('shown'); muat(); }

/* ====== ambil & tampilkan hasil ====== */
let DATA = [];
function muat(){
  onValue(ref(db, "results"), snap => {
    const v = snap.val() || {};
    DATA = Object.values(v).sort((a,b)=>(b.selesai||0)-(a.selesai||0));
    render();
  });
}
$('btnRefresh').addEventListener('click', muat);

function tgl(ms){ return ms ? new Date(ms).toLocaleString('id-ID',{dateStyle:'medium',timeStyle:'short'}) : "—"; }

function render(){
  const list = $('list');
  if (!DATA.length){ list.innerHTML = '<div class="empty">Belum ada partai yang selesai.</div>'; return; }
  list.innerHTML = "";
  DATA.forEach(r => {
    const menang = r.winner==="chung" ? r.chungName : r.hongName;
    const el = document.createElement('div');
    el.className = "card";
    el.innerHTML = `
      <div class="hd"><span class="no">${r.no||"—"}</span><span class="cat">${r.category||""}</span></div>
      <div class="vs"><span class="c">${r.chungName||"Chung"}</span> vs <span class="h">${r.hongName||"Hong"}</span></div>
      <div class="res">Menang ronde ${r.wonChung||0} : ${r.wonHong||0} · Pemenang: <b>${menang||"—"}</b></div>
      <div class="foot"><span class="time">${tgl(r.selesai)}</span></div>`;
    const btn = document.createElement('button');
    btn.className = "btn gold"; btn.textContent = "PDF";
    btn.addEventListener('click', () => pdfPartai(r));
    el.querySelector('.foot').appendChild(btn);
    list.appendChild(el);
  });
}

/* ====== PDF per-partai ====== */
async function pdfPartai(r){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let rounds = {};
  try{ const s = await get(ref(db, `matches/${r.kode}/rounds`)); if (s.exists()) rounds = s.val(); }catch(e){}

  doc.setFontSize(18); doc.text("HASIL PERTANDINGAN", 105, 20, {align:"center"});
  doc.setFontSize(11); doc.setTextColor(120);
  doc.text("Live Taekwondo — idwt.web.id", 105, 27, {align:"center"});
  doc.setTextColor(0);

  doc.setFontSize(12);
  doc.text(`Nomor Partai : ${r.no||"-"}`, 20, 42);
  doc.text(`Kategori     : ${r.category||"-"}`, 20, 50);
  doc.text(`Tanggal      : ${tgl(r.selesai)}`, 20, 58);

  doc.setDrawColor(200); doc.line(20, 64, 190, 64);
  doc.setFontSize(14);
  doc.setTextColor(30,111,217); doc.text(`Chung: ${r.chungName||"Chung"}`, 20, 76);
  doc.setTextColor(217,38,30);  doc.text(`Hong: ${r.hongName||"Hong"}`, 120, 76);
  doc.setTextColor(0);

  // tabel ronde
  const body = [];
  Object.keys(rounds).sort().forEach(k => {
    const rd = rounds[k];
    body.push([`Ronde ${rd.round}`, String(rd.chung??"-"), String(rd.hong??"-"),
               rd.winner==="chung"?(r.chungName||"Chung"):(r.hongName||"Hong")]);
  });
  if (body.length && doc.autoTable){
    doc.autoTable({ startY:84, head:[["Ronde","Chung","Hong","Pemenang"]], body,
      styles:{fontSize:11}, headStyles:{fillColor:[23,28,36]} });
  }
  let y = (doc.lastAutoTable ? doc.lastAutoTable.finalY : 90) + 14;
  doc.setFontSize(13);
  doc.text(`Menang Ronde : ${r.wonChung||0} - ${r.wonHong||0}`, 20, y);
  doc.setFontSize(15); doc.setTextColor(20,140,60);
  doc.text(`PEMENANG: ${(r.winner==="chung"?r.chungName:r.hongName)||"-"}`, 20, y+10);
  doc.setTextColor(0);

  doc.setFontSize(9); doc.setTextColor(150);
  doc.text("idwt.web.id · V1 · ©SRISP 2026", 105, 285, {align:"center"});
  doc.save(`Hasil_${r.no||r.kode}.pdf`);
}

/* ====== rekap semua partai ====== */
$('btnRekap').addEventListener('click', () => {
  if (!DATA.length){ alert("Belum ada hasil."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(18); doc.text("REKAP TURNAMEN", 105, 20, {align:"center"});
  doc.setFontSize(11); doc.setTextColor(120);
  doc.text("Live Taekwondo — idwt.web.id", 105, 27, {align:"center"});
  doc.setTextColor(0);

  const body = DATA.map(r => [
    r.no||"-", r.category||"-", r.chungName||"Chung", r.hongName||"Hong",
    `${r.wonChung||0}-${r.wonHong||0}`, (r.winner==="chung"?r.chungName:r.hongName)||"-"
  ]);
  if (doc.autoTable){
    doc.autoTable({ startY:34, head:[["Partai","Kategori","Chung","Hong","Skor","Pemenang"]], body,
      styles:{fontSize:9}, headStyles:{fillColor:[23,28,36]} });
  }
  doc.setFontSize(9); doc.setTextColor(150);
  const yy = (doc.lastAutoTable ? doc.lastAutoTable.finalY : 40) + 10;
  doc.text(`Total ${DATA.length} partai · dibuat ${tgl(Date.now())}`, 20, yy);
  doc.text("idwt.web.id · V1 · ©SRISP 2026", 105, 290, {align:"center"});
  doc.save("Rekap_Turnamen.pdf");
});
</script>

<div id="tkdLoader">
  <div class="tkd-spin">
    <svg viewBox="0 0 100 100" width="86" height="86" aria-hidden="true">
      <circle cx="50" cy="50" r="48" fill="#1E6FD9"/>
      <path d="M50,2 A48,48 0 0,1 50,98 A24,24 0 0,1 50,50 A24,24 0 0,0 50,2 Z" fill="#D9261E"/>
      <circle cx="50" cy="26" r="7.5" fill="#1E6FD9"/>
      <circle cx="50" cy="74" r="7.5" fill="#D9261E"/>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#fff" stroke-width="2.5"/>
    </svg>
  </div>
  <div class="tkd-txt">LIVE TAEKWONDO</div>
</div>
<style>
#tkdLoader{position:fixed;inset:0;background:#0B0E13;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:99999;transition:opacity .45s}
#tkdLoader.out{opacity:0;pointer-events:none}
#tkdLoader .tkd-spin{animation:tkdSpin 1s cubic-bezier(.5,.05,.4,.95) infinite}
@keyframes tkdSpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
#tkdLoader .tkd-txt{font:800 12px system-ui,-apple-system,sans-serif;letter-spacing:.35em;color:#F5B325;animation:tkdPulse 1s ease-in-out infinite}
@keyframes tkdPulse{0%,100%{opacity:.5}50%{opacity:1}}
</style>
<script>window.addEventListener('load',function(){setTimeout(function(){var l=document.getElementById('tkdLoader');if(l){l.classList.add('out');setTimeout(function(){l.remove();},480);}},650);});</script>
<div style="position:fixed;left:8px;bottom:6px;font-size:10px;color:#5a6472;letter-spacing:.08em;z-index:5;pointer-events:none">V1 &middot; &copy;SRISP 2026</div>
</body>
</html>
